version: '3.8'

# Hot-reload 預覽用,連到 production compose 已啟動的 db。
# 用法: docker compose -f docker-compose.dev.yml up
# 開在 http://localhost:3002 ,改 app/ 底下程式碼即時生效。
services:
  app-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npm run dev"
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/fitness
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3002
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./app:/app
      - dev_node_modules:/app/node_modules
    networks:
      - default

volumes:
  dev_node_modules:

networks:
  default:
    name: fitness-site_app-network
    external: true
